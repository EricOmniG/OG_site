# ============================================================
#  samconfig.toml — SAM CLI deploy configuration
#  Checked in — contains NO secrets (those live in SSM)
# ============================================================
version = 0.1

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
stack_name        = "omnigenius-api"
s3_bucket         = "omnigenius-sam-artifacts"   # SAM deployment artifact bucket — create once manually
s3_prefix         = "omnigenius"
region            = "us-east-1"
capabilities      = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = true
fail_on_empty_changeset = false
parameter_overrides = [
  "Stage=production",
  "DomainName=api.omnigenius.co",
  "CertificateArn=arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/CERT_ID"
]

[staging.deploy.parameters]
stack_name        = "omnigenius-api-staging"
s3_bucket         = "omnigenius-sam-artifacts"
s3_prefix         = "omnigenius-staging"
region            = "us-east-1"
capabilities      = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = false
parameter_overrides = [
  "Stage=staging",
  "DomainName=api-staging.omnigenius.co",
  "CertificateArn=arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/CERT_ID"
]
