# ============================================================
#  supabase/config.toml
#  Local Supabase development config
#  Docs: https://supabase.com/docs/guides/cli/config
#
#  Commands:
#    supabase init              (already done — this file is the result)
#    supabase start             Start local Supabase stack (Docker)
#    supabase db push           Push schema to remote project
#    supabase db pull           Pull remote schema to local
#    supabase migration new <name>   Create a new migration file
#    supabase gen types typescript   Generate TypeScript types from schema
# ============================================================

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323
api_url = "http://localhost"

[inbucket]
port = 54324    # Local email testing inbox

[storage]
file_size_limit = "10MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "https://omnigenius.co",
  "https://staging.omnigenius.co"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # Clerk handles email verification

[analytics]
enabled = false
